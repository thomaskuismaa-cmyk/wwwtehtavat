<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>tehtävä 1</title>
<script>
function laske()
{
    var a = Number(document.getElementById("luku1").value);
    var b = Number(document.getElementById("luku2").value);

    var summa = a + b;
    var erotus = a - b;
    var tulo = a * b;
    var osamaara = a / b;
    var jakojaannos = a % b;

    document.getElementById("summa").innerHTML = "Summa: " + summa;
    document.getElementById("erotus").innerHTML = "Erotus: " + erotus;
    document.getElementById("tulo").innerHTML = "Tulo: " + tulo;
    document.getElementById("osamaara").innerHTML = "Osamäärä: " + osamaara;
    document.getElementById("jakojaannos").innerHTML = "Jakojäännös: " + jakojaannos;
}
</script>
</head>

<body>

<h2>Anna luvut</h2>

<input type="number" id="luku1" placeholder="Ensimmäinen luku">
<br><br>
<input type="number" id="luku2" placeholder="Toinen luku">
<br><br>

<button onclick="laske()">Laske</button>

<h3>Tulokset</h3>
<p id="summa"></p>
<p id="erotus"></p>
<p id="tulo"></p>
<p id="osamaara"></p>
<p id="jakojaannos"></p>

</body>
</html>
